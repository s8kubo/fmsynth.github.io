<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FM Synth Demo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>FM Synth</h1>

<div class="control">

<label>Carrier Frequency</label>

<input
id="carrier"
type="range"
min="50"
max="1000"
value="220">

<span id="carrierValue">220</span>

</div>

<div class="control">

<label>Modulator Frequency</label>

<input
id="mod"
type="range"
min="0"
max="1000"
value="220">

<span id="modValue">220</span>

</div>

<div class="control">

<label>Mod Depth</label>

<input
id="depth"
type="range"
min="0"
max="1000"
value="100">

<span id="depthValue">100</span>

</div>

<button id="play">Play</button>
<button id="stop">Stop</button>

<script src="script.js"></script>

</body>
</html>
