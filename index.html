<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>FM</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <h1>FM</h1>

    <section>
      <h2>carrier</h2>

      <p class="control">
        <label for="carrier-frequency">
          frequency
        </label>

        <output id="carrier-frequency-value">
          220 Hz
        </output>

        <input
          id="carrier-frequency"
          type="range"
          min="20"
          max="2000"
          value="220"
          step="1"
        >
      </p>

      <p class="control">
        <label for="carrier-wave">
          waveform
        </label>

        <select id="carrier-wave">
          <option value="sine">sine</option>
          <option value="triangle">triangle</option>
          <option value="sawtooth">sawtooth</option>
          <option value="square">square</option>
        </select>
      </p>
    </section>

    <section>
      <h2>modulator</h2>

      <p class="control">
        <label for="modulator-frequency">
          frequency
        </label>

        <output id="modulator-frequency-value">
          110.0 Hz
        </output>

        <input
          id="modulator-frequency"
          type="range"
          min="0.1"
          max="2000"
          value="110"
          step="0.1"
        >
      </p>

      <p class="control">
        <label for="modulator-wave">
          waveform
        </label>

        <select id="modulator-wave">
          <option value="sine">sine</option>
          <option value="triangle">triangle</option>
          <option value="sawtooth">sawtooth</option>
          <option value="square">square</option>
        </select>
      </p>

      <p class="control">
        <label for="modulation-depth">
          depth
        </label>

        <output id="modulation-depth-value">
          220 Hz
        </output>

        <input
          id="modulation-depth"
          type="range"
          min="0"
          max="3000"
          value="220"
          step="1"
        >
      </p>
    </section>

    <section>
      <h2>output</h2>

      <p class="control">
        <label for="volume">
          volume
        </label>

        <output id="volume-value">
          10%
        </output>

        <input
          id="volume"
          type="range"
          min="0"
          max="0.25"
          value="0.1"
          step="0.001"
        >
      </p>

      <p>
        <button
          id="play-button"
          type="button"
        >
          start
        </button>
      </p>

      <p
        id="status"
        aria-live="polite"
      >
        stopped
      </p>
    </section>

    <section>
      <canvas
        id="oscilloscope"
        width="1200"
        height="360"
        aria-label="FM変調後の波形"
      ></canvas>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
