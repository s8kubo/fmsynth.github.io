<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="2つの波によるFM変調を体験できるWebシンセサイザー"
  >

  <title>FM Laboratory</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app">
    <header class="header">
      <p class="eyebrow">WEB AUDIO EXPERIMENT</p>
      <h1>FM LABORATORY</h1>

      <p class="introduction">
        キャリア波の周波数を、モジュレーター波で揺らします。
      </p>
    </header>

    <section class="visualizer-panel">
      <div class="visualizer-header">
        <div>
          <p class="panel-number">01</p>
          <h2>OUTPUT WAVE</h2>
        </div>

        <div
          id="status"
          class="status"
          aria-live="polite"
        >
          STOPPED
        </div>
      </div>

      <canvas
        id="oscilloscope"
        width="1200"
        height="360"
        aria-label="FM変調後の波形"
      ></canvas>
    </section>

    <div class="controls-grid">
      <section class="control-panel">
        <div class="panel-heading">
          <p class="panel-number">02</p>
          <h2>CARRIER</h2>
        </div>

        <div class="control">
          <div class="control-label">
            <label for="carrier-frequency">
              Frequency
            </label>

            <output id="carrier-frequency-value">
              220 Hz
            </output>
          </div>

          <input
            id="carrier-frequency"
            type="range"
            min="20"
            max="2000"
            value="220"
            step="1"
          >
        </div>

        <div class="control">
          <div class="control-label">
            <label for="carrier-wave">
              Waveform
            </label>
          </div>

          <select id="carrier-wave">
            <option value="sine">Sine</option>
            <option value="triangle">Triangle</option>
            <option value="sawtooth">Sawtooth</option>
            <option value="square">Square</option>
          </select>
        </div>
      </section>

      <section class="control-panel">
        <div class="panel-heading">
          <p class="panel-number">03</p>
          <h2>MODULATOR</h2>
        </div>

        <div class="control">
          <div class="control-label">
            <label for="modulator-frequency">
              Frequency
            </label>

            <output id="modulator-frequency-value">
              110.0 Hz
            </output>
          </div>

          <input
            id="modulator-frequency"
            type="range"
            min="0.1"
            max="2000"
            value="110"
            step="0.1"
          >
        </div>

        <div class="control">
          <div class="control-label">
            <label for="modulator-wave">
              Waveform
            </label>
          </div>

          <select id="modulator-wave">
            <option value="sine">Sine</option>
            <option value="triangle">Triangle</option>
            <option value="sawtooth">Sawtooth</option>
            <option value="square">Square</option>
          </select>
        </div>

        <div class="control">
          <div class="control-label">
            <label for="modulation-depth">
              Modulation Depth
            </label>

            <output id="modulation-depth-value">
              220 Hz
            </output>
          </div>

          <input
            id="modulation-depth"
            type="range"
            min="0"
            max="3000"
            value="220"
            step="1"
          >
        </div>
      </section>
    </div>

    <section class="output-panel">
      <div class="panel-heading">
        <p class="panel-number">04</p>
        <h2>OUTPUT</h2>
      </div>

      <div class="output-controls">
        <div class="control volume-control">
          <div class="control-label">
            <label for="volume">
              Volume
            </label>

            <output id="volume-value">
              10%
            </output>
          </div>

          <input
            id="volume"
            type="range"
            min="0"
            max="0.25"
            value="0.1"
            step="0.001"
          >
        </div>

        <button
          id="play-button"
          class="play-button"
          type="button"
        >
          START
        </button>
      </div>
    </section>

    <section class="information">
      <h2>HOW IT WORKS</h2>

      <div class="formula">
        f(t) = f<sub>c</sub> + D sin(2πf<sub>m</sub>t)
      </div>

      <dl>
        <div>
          <dt>f<sub>c</sub></dt>
          <dd>キャリア周波数</dd>
        </div>

        <div>
          <dt>f<sub>m</sub></dt>
          <dd>モジュレーター周波数</dd>
        </div>

        <div>
          <dt>D</dt>
          <dd>変調の深さ</dd>
        </div>
      </dl>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
