<h1>Body12 FM Synth</h1>

<div class="control">
  <label>Frequency</label>
  <input id="freq" type="range"
         min="50" max="2000"
         value="220">
  <span id="freqValue">220</span>
</div>

<div class="control">
  <label>Index</label>
  <input id="index" type="range"
         min="0" max="20"
         step="0.1"
         value="2">
</div>

<div class="control">
  <label>Ratio</label>
  <input id="ratio" type="range"
         min="0.25"
         max="8"
         step="0.01"
         value="2">
</div>

<div class="control">
  <label>LFO</label>
  <input id="lfo"
         type="range"
         min="0"
         max="25"
         step="0.1"
         value="0">
</div>

<div class="control">
  <label>FreqShift</label>
  <input id="shift"
         type="range"
         min="-3000"
         max="3000"
         value="0">
</div>

<button id="play">
Play
</button>

<button id="stop">
Stop
</button>
